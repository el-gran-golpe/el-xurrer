repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-check
        name: Ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        always_run: true

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        always_run: true
